<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYSTEM</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <div class="app rank-f" id="app">
      <header class="app-header">
        <div>
          <h1>STATUS</h1>
          <p class="sub">현실 미션을 완료하고 상태창을 갱신합니다.</p>
        </div>

        <div class="header-actions">
          <button id="exportDataButton" class="icon-button" type="button" aria-label="데이터 내보내기">⇩</button>
          <button id="importDataButton" class="icon-button" type="button" aria-label="데이터 가져오기">⇧</button>
        </div>
      </header>

      <section class="profile">
        <button class="avatar-wrap avatar-action" id="avatarButton" type="button" aria-label="사용자 이미지 삽입">
          <div class="avatar" id="avatarBox">USER<br>IMAGE</div>
          <div class="avatar-overlay" id="avatarOverlay">이미지 삽입</div>
        </button>

        <div class="stat">
          <label class="player-name">
            PLAYER ::
            <input id="userNameInput" maxlength="16" aria-label="사용자 이름" />
          </label><br>
          RANK :: <span id="rankText">F급</span><br>
          LV. <span id="level">1</span><br>
          EXP <span id="currentExp">0</span> / 100
          <div class="bar"><div class="bar-fill" id="expBar"></div></div>
          CLEAR RATE :: <span id="clearRate">0</span>%
        </div>

        <input type="file" id="imageInput" accept="image/*" hidden />
      </section>

      <div class="section-title">TODAY MISSION</div>

      <div class="add">
        <select id="statInput">
          <option value="focus">집중</option>
          <option value="energy">체력</option>
          <option value="knowledge">지식</option>
          <option value="life">생활</option>
        </select>
        <input id="missionInput" placeholder="미션 입력" />
        <select id="expInput">
          <option value="5">◇</option>
          <option value="15" selected>◆</option>
          <option value="30">◆◆</option>
          <option value="60">◆◆◆</option>
        </select>
        <button id="addMissionButton" class="add-submit" type="button" aria-label="미션 등록">+</button>
      </div>

      <div class="mission-counter" id="missionFilters" aria-label="미션 상태 필터">
        <div class="mission-counter-title">MISSION COUNT</div>
        <div class="mission-counter-row">
          <button type="button" data-filter="all">
            <span>ALL</span>
            <strong id="filterAllCount">00</strong>
          </button>
          <button type="button" data-filter="active">
            <span>ACTIVE</span>
            <strong id="filterActiveCount">00</strong>
          </button>
          <button type="button" data-filter="done">
            <span>CLEAR</span>
            <strong id="filterDoneCount">00</strong>
          </button>
        </div>
      </div>

      <div class="mission-list" id="missionList"></div>

      <div class="section-title">ACTIVITY RECORD</div>

      <div class="record-grid">
        <div class="record-card">
          STREAK
          <strong id="streakRecord">0 DAY</strong>
        </div>
        <div class="record-card">
          AVG CLEAR
          <strong id="avgClearRecord">0%</strong>
        </div>
        <div class="record-card">
          TOTAL EXP
          <strong id="totalExpRecord">0</strong>
        </div>
        <div class="record-card">
          MISSIONS
          <strong id="totalMissionRecord">0</strong>
        </div>
      </div>

      <div class="section-title">STAT</div>
      <div class="stats-grid" id="statsGrid"></div>

      <div class="section-title">SYSTEM LOG</div>
      <div class="log" id="log">SYSTEM READY.</div>

      <div class="actions">
        <button id="openResultButton">RESULT</button>
        <button id="finishDayButton">FINISH DAY</button>
      </div>

      <input type="file" id="importDataInput" accept="application/json" hidden />
    </div>
  </main>

  <div class="modal" id="modal">
    <div class="modal-inner">
      <div class="result-card" id="resultCard">
        <div class="result-title">RESULT</div>

        <div class="result-profile">
          <div class="result-avatar">
            <div class="avatar" id="resultAvatar">USER</div>
          </div>

          <div class="result-text" id="resultHeader"></div>
        </div>

        <div class="result-text" id="resultText"></div>
        <div class="result-date" id="resultDate"></div>
      </div>

      <div class="modal-buttons">
        <button id="saveImageButton">IMAGE SAVE</button>
        <button id="closeResultButton">CLOSE</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
